<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>簡易記帳本</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

  <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
    <h1 class="text-2xl font-bold text-slate-800 mb-6 text-center tracking-wide">💰 簡易記帳本</h1>
    
    <form id="ledgerForm" onsubmit="submitForm(event)" class="space-y-4">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">日期</label>
        <input type="date" id="date" required class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">項目</label>
        <input type="text" id="item" placeholder="例如：早餐、午餐、捷運" required class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">類別</label>
        <select id="category" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
          <option value="食">🍔 食</option>
          <option value="衣">👕 衣</option>
          <option value="住">🏠 住</option>
          <option value="行">🚗 行</option>
          <option value="育">📚 育</option>
          <option value="樂">🎉 樂</option>
          <option value="其他">📝 其他</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">金額</label>
        <input type="number" id="amount" placeholder="輸入金額" required class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">備註</label>
        <input type="text" id="note" placeholder="（選填）" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>

      <button type="submit" id="submitBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition duration-200 shadow-md">
        新增紀錄
      </button>
    </form>

    <div id="statusMessage" class="mt-4 text-center text-sm font-semibold hidden"></div>
  </div>

  <script>
    // 自動預填今天的日期
    document.getElementById('date').valueAsDate = new Date();

    function submitForm(e) {
      e.preventDefault();
      
      const submitBtn = document.getElementById('submitBtn');
      const statusMessage = document.getElementById('statusMessage');
      
      // 禁用按鈕，防止重複點擊
      submitBtn.disabled = true;
      submitBtn.innerText = '正在寫入試算表...';
      
      // 收集表單資料
      const formData = {
        date: document.getElementById('date').value,
        item: document.getElementById('item').value,
        category: document.getElementById('category').value,
        amount: document.getElementById('amount').value,
        note: document.getElementById('note').value
      };

      // 呼叫 Google Apps Script 的後端 addRecord 函式
      google.script.run
        .withSuccessHandler(function(response) {
          submitBtn.disabled = false;
          submitBtn.innerText = '新增紀錄';
          
          // 顯示成功提示
          statusMessage.textContent = '✅ 成功寫入 Google 試算表！';
          statusMessage.className = 'mt-4 text-center text-sm font-semibold text-emerald-600 animate-pulse';
          statusMessage.classList.remove('hidden');
          
          // 成功後清空欄位（日期保留）
          document.getElementById('item').value = '';
          document.getElementById('amount').value = '';
          document.getElementById('note').value = '';
          
          // 3秒後自動隱藏成功訊息
          setTimeout(() => statusMessage.classList.add('hidden'), 3000);
        })
        .withFailureHandler(function(error) {
          submitBtn.disabled = false;
          submitBtn.innerText = '新增紀錄';
          
          statusMessage.textContent = '❌ 發生錯誤：' + error;
          statusMessage.className = 'mt-4 text-center text-sm font-semibold text-rose-600';
          statusMessage.classList.remove('hidden');
        })
        .addRecord(formData);
    }
  </script>
</body>
</html>
